name: Deploy to S3

on:
  push:
    branches: [ "main" ]

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Install dependencies
      working-directory: html
      run: npm ci

    - name: Build project
      working-directory: html
      env:
        VITE_USER_POOL_ID: ${{ secrets.VITE_USER_POOL_ID }}
        VITE_USER_POOL_CLIENT_ID: ${{ secrets.VITE_USER_POOL_CLIENT_ID }}
        VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
      run: npm run build

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
        aws-region: us-east-1

    - name: Sync build folder to S3
      run: aws s3 sync html/dist/ s3://${{ secrets.S3_BUCKET }} --delete

    - name: Invalidate CloudFront cache
      run: aws cloudfront create-invalidation --distribution-id ${{ vars.AWS_CF_DISTRO }} --paths "/*"
